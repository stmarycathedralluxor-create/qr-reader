<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Simple CRUD App</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .item {
      background: #eee;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="box">

<h1>CRUD App</h1>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="phone" placeholder="Phone">

<button onclick="addData()">Add</button>

<div id="list"></div>

</div>

<script>

const supabaseUrl = "https://fjmmecgkrvqzrtjnbqqx.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqbW1lY2drcnZxenJ0am5icXF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MzE3NzEsImV4cCI6MjA5NDAwNzc3MX0.7hKv7xOasyeEXDfwA5UNfP1eFm0HebTMbfHty5m6i7Q"; // ⚠️ put your real anon key here

const client = supabase.createClient(supabaseUrl, supabaseKey);



// LOAD DATA
async function loadData() {

  let { data, error } = await client
    .from('people')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!data || data.length === 0) {
    list.innerHTML = "<p>No data found</p>";
    return;
  }

  data.forEach(item => {

    list.innerHTML += `
      <div class="item">
        <b>Name:</b> ${item.name}<br>
        <b>Age:</b> ${item.age}<br>
        <b>Phone:</b> ${item.phone}<br><br>

        <button onclick="deleteData('${item.id}')">Delete</button>
        <button onclick="editData('${item.id}','${item.name}','${item.age}','${item.phone}')">Edit</button>
      </div>
    `;
  });
}



// ADD DATA
async function addData() {

  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const phone = document.getElementById("phone").value;

  if (!name || !age || !phone) {
    alert("Please fill all fields");
    return;
  }

  let { error } = await client
    .from('people')
    .insert([{ name, age, phone }]);

  if (error) {
    console.log(error);
    return;
  }

  clearInputs();
  loadData();
}



// DELETE DATA
async function deleteData(id) {

  let { error } = await client
    .from('people')
    .delete()
    .eq('id', id);

  if (error) {
    console.log(error);
    return;
  }

  loadData();
}



// EDIT DATA
async function editData(id, name, age, phone) {

  const newName = prompt("Name", name);
  const newAge = prompt("Age", age);
  const newPhone = prompt("Phone", phone);

  if (!newName || !newAge || !newPhone) return;

  let { error } = await client
    .from('people')
    .update({
      name: newName,
      age: newAge,
      phone: newPhone
    })
    .eq('id', id);

  if (error) {
    console.log(error);
    return;
  }

  loadData();
}



// CLEAR INPUTS
function clearInputs() {
  document.getElementById("name").value = "";
  document.getElementById("age").value = "";
  document.getElementById("phone").value = "";
}



// START
loadData();

</script>

</body>
</html>
