<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Simple CRUD App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

    body{
      font-family:Arial;
      background:#f4f4f4;
      padding:20px;
    }

    h1{
      text-align:center;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
      margin:auto;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      padding:10px 15px;
      margin-top:10px;
      cursor:pointer;
      font-size:16px;
    }

    .item{
      background:#eee;
      padding:15px;
      margin-top:10px;
      border-radius:10px;
    }

  </style>
</head>

<body>

<div class="box">

<h1>CRUD App</h1>

<input id="name" placeholder="Name">

<input id="age" placeholder="Age">

<input id="phone" placeholder="Phone">

<button onclick="addData()">Add</button>

<div id="list"></div>

</div>

<script>


const supabaseUrl = "https://fjmmecgkrvqzrtjnbqqx.supabase.co";
const supabaseKey = "sb_publishable_X-lOtAYUWCD3vrgpZDVmPw_3afrmz_w";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);


async function loadData() {

  let { data, error } = await supabase
    .from('people')
    .select('*')
    .order('created_at', { ascending: false });

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {

    list.innerHTML += `
      <div class="item">
        <b>Name:</b> ${item.name}<br>
        <b>Age:</b> ${item.age}<br>
        <b>Phone:</b> ${item.phone}<br><br>

        <button onclick="deleteData('${item.id}')">Delete</button>
        <button onclick="editData('${item.id}','${item.name}','${item.age}','${item.phone}')">Edit</button>
      </div>
    `;
  });
}



async function addData(){

  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const phone = document.getElementById("phone").value;

  await supabase
    .from('people')
    .insert([{ name, age, phone }]);

  clearInputs();
  loadData();
}



async function deleteData(id){

  await supabase
    .from('people')
    .delete()
    .eq('id', id);

  loadData();
}



async function editData(id,name,age,phone){

  const newName = prompt("Name", name);
  const newAge = prompt("Age", age);
  const newPhone = prompt("Phone", phone);

  await supabase
    .from('people')
    .update({
      name: newName,
      age: newAge,
      phone: newPhone
    })
    .eq('id', id);

  loadData();
}


function clearInputs(){

  document.getElementById("name").value = "";

  document.getElementById("age").value = "";

  document.getElementById("phone").value = "";

}



loadData();

</script>

</body>

</html>
