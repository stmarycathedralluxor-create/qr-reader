<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>People CRUD App</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      padding: 30px 15px;
      color: #333;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #4a4a4a;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 20px;
    }
    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #667eea; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }
    .btn-add    { background: #4CAF50; color: white; }
    .btn-edit   { background: #2196F3; color: white; margin-right: 5px; }
    .btn-delete { background: #f44336; color: white; }
    .btn-cancel { background: #9e9e9e; color: white; margin-left: 8px; }

    .status {
      text-align: center;
      margin: 15px 0;
      font-style: italic;
      color: #666;
    }

    .record-list { list-style: none; margin-top: 20px; }
    .record-item {
      background: #f9f9f9;
      border-left: 4px solid #667eea;
      padding: 12px 15px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .record-info { flex: 1; min-width: 200px; }
    .record-info strong { color: #333; }
    .record-info small { color: #888; display: block; margin-top: 4px; }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 People CRUD App</h1>

    <!-- Input form -->
    <div class="form-row">
      <input type="text"   id="nameInput"  placeholder="Name" />
      <input type="number" id="ageInput"   placeholder="Age" />
      <input type="text"   id="phoneInput" placeholder="Phone" />
      <button id="actionBtn" class="btn-add" onclick="handleAction()">Add</button>
    </div>
    <div id="cancelWrapper" style="display:none; text-align:center; margin-bottom:10px;">
      <button class="btn-cancel" onclick="cancelEdit()">Cancel Edit</button>
    </div>

    <div class="status" id="status">Loading records...</div>

    <ul class="record-list" id="recordList"></ul>
  </div>

  <!-- Supabase JS v2 from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    /* ===========================================
       🔑 STEP 1: Replace these with your values
       =========================================== */
    const SUPABASE_URL = "https://cjxlwfrqfqwjhugpjdxz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqeGx3ZnJxZnF3amh1Z3BqZHh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NDM4OTgsImV4cCI6MjA5NDAxOTg5OH0.-U43SSHXr2xw15B4AvNUwFEObzWbkuZpe-2hqgAxrOQ";

    /* ===========================================
       🔌 Initialize Supabase Client
       =========================================== */
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Track edit mode
    let editingId = null;

    // DOM references
    const nameInput  = document.getElementById("nameInput");
    const ageInput   = document.getElementById("ageInput");
    const phoneInput = document.getElementById("phoneInput");
    const actionBtn  = document.getElementById("actionBtn");
    const recordList = document.getElementById("recordList");
    const statusEl   = document.getElementById("status");
    const cancelWrapper = document.getElementById("cancelWrapper");

    /* ===========================================
       📥 READ: Fetch all records (newest first)
       =========================================== */
    async function fetchRecords() {
      statusEl.textContent = "Loading records...";
      try {
        const { data, error } = await client
          .from("people")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          console.log("Fetch error:", error);
          statusEl.textContent = "❌ Error loading records. Check console.";
          return;
        }

        renderRecords(data || []);
      } catch (err) {
        console.log("Unexpected fetch error:", err);
        statusEl.textContent = "❌ Unexpected error. Check console.";
      }
    }

    /* ===========================================
       🖼️ Render records to the DOM
       =========================================== */
    function renderRecords(records) {
      recordList.innerHTML = "";

      if (!records || records.length === 0) {
        statusEl.textContent = "No records yet. Add your first person above!";
        return;
      }

      statusEl.textContent = `Total records: ${records.length}`;

      records.forEach((p) => {
        const li = document.createElement("li");
        li.className = "record-item";

        // Safely handle nulls
        const safeName  = p.name  ?? "(no name)";
        const safeAge   = p.age   ?? "—";
        const safePhone = p.phone ?? "—";
        const safeDate  = p.created_at
          ? new Date(p.created_at).toLocaleString()
          : "";

        li.innerHTML = `
          <div class="record-info">
            <strong>${escapeHtml(safeName)}</strong>
            — Age: ${escapeHtml(String(safeAge))}
            — 📞 ${escapeHtml(String(safePhone))}
            <small>Added: ${escapeHtml(safeDate)}</small>
          </div>
          <div>
            <button class="btn-edit"   onclick="startEdit('${p.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteRecord('${p.id}')">Delete</button>
          </div>
        `;
        recordList.appendChild(li);
      });
    }

    // Tiny helper to avoid HTML injection from DB values
    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /* ===========================================
       ➕ CREATE / ✏️ UPDATE (handled by one button)
       =========================================== */
    async function handleAction() {
      const name  = nameInput.value.trim();
      const ageV  = ageInput.value.trim();
      const phone = phoneInput.value.trim();

      if (!name) {
        alert("Name is required.");
        return;
      }

      const age = ageV === "" ? null : parseInt(ageV, 10);
      if (ageV !== "" && Number.isNaN(age)) {
        alert("Age must be a number.");
        return;
      }

      try {
        if (editingId) {
          // UPDATE existing record
          const { error } = await client
            .from("people")
            .update({ name, age, phone })
            .eq("id", editingId);

          if (error) {
            console.log("Update error:", error);
            alert("Update failed. Check console.");
            return;
          }
          cancelEdit();
        } else {
          // CREATE new record
          const { error } = await client
            .from("people")
            .insert([{ name, age, phone }]);

          if (error) {
            console.log("Insert error:", error);
            alert("Insert failed. Check console.");
            return;
          }
        }

        clearForm();
        fetchRecords();
      } catch (err) {
        console.log("Unexpected action error:", err);
      }
    }

    /* ===========================================
       ✏️ Begin editing a record
       =========================================== */
    async function startEdit(id) {
      try {
        const { data, error } = await client
          .from("people")
          .select("*")
          .eq("id", id)
          .single();

        if (error || !data) {
          console.log("Load-for-edit error:", error);
          alert("Could not load record for editing.");
          return;
        }

        editingId = id;
        nameInput.value  = data.name  ?? "";
        ageInput.value   = data.age   ?? "";
        phoneInput.value = data.phone ?? "";

        actionBtn.textContent = "Update";
        actionBtn.classList.remove("btn-add");
        actionBtn.style.background = "#ff9800";
        cancelWrapper.style.display = "block";

        nameInput.focus();
      } catch (err) {
        console.log("Unexpected edit error:", err);
      }
    }

    function cancelEdit() {
      editingId = null;
      actionBtn.textContent = "Add";
      actionBtn.classList.add("btn-add");
      actionBtn.style.background = "";
      cancelWrapper.style.display = "none";
      clearForm();
    }

    /* ===========================================
       🗑️ DELETE record
       =========================================== */
    async function deleteRecord(id) {
      if (!confirm("Delete this record?")) return;

      try {
        const { error } = await client.from("people").delete().eq("id", id);
        if (error) {
          console.log("Delete error:", error);
          alert("Delete failed. Check console.");
          return;
        }

        // If deleting the record currently being edited, cancel edit mode
        if (editingId === id) cancelEdit();

        fetchRecords();
      } catch (err) {
        console.log("Unexpected delete error:", err);
      }
    }

    /* ===========================================
       🧹 Helpers
       =========================================== */
    function clearForm() {
      nameInput.value  = "";
      ageInput.value   = "";
      phoneInput.value = "";
    }

    // Initial load
    fetchRecords();
  </script>
</body>
</html>
